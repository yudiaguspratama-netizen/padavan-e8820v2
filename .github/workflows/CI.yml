name: Build Padavan E8820V2

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    # Prevent unnecessary builds if you only change the README
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: build
    runs-on: ubuntu-20.04
    env:
      images_dir: /opt/images
    steps:
      - uses: actions/checkout@v3

      # CRITICAL: This clears ~20GB of space so the compiler runs faster
      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker image prune -a -f

      - name: Prepare environment
        run: |
          sudo apt update
          # Added build-essential and cleaning apt cache to save time
          sudo apt install -y libtool-bin gperf python3-docutils autopoint gettext 7z build-essential
          sudo apt clean

      - name: Prepare toolchain
        run: |
          cd toolchain-mipsel
          sh dl_toolchain.sh

      - name: Start build
        run: |
          cd trunk
          mkdir -p ${images_dir}
          # Using the standard build script for E8820V2
          fakeroot ./build_firmware_ci E8820V2
          
          # Check if the file exists before copying to avoid silent failures
          if [ -f images/*.trx ]; then
            cp -f images/*.trx ${images_dir}/E8820V2.trx
          else
            echo "Build failed: Image not found"
            exit 1
          fi

      - name: Upload images to Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Padavan_ZTE_E8820V2
          path: /opt/images/E8820V2.trx
